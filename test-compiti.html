<style>
:root{
  --bg:#13110f;
  --bg2:#1c1916;
  --card:#251d16;
  --card2:#2c2219;
  --line:#3a2d22;
  --txt:#f4ede2;
  --muted:#9c8b76;
  --gold:#d9a441;
  --gold2:#e6bd5c;
  --green:#7fbf7a;
  --red:#d17a54;
  --blu:#3f726e;
  --green-bg:rgba(45,122,79,.16);
  --red-bg:rgba(192,57,43,.16);
  --shadow:0 8px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;padding:0;
  background:var(--bg);
  color:var(--txt);
  font-family:'Inter',system-ui,sans-serif;
  line-height:1.55;
  min-height:100vh;
}
.wrap{max-width:820px;margin:0 auto;padding:26px 18px 90px}
header.top{
  text-align:center;margin:-26px -18px 22px;
  padding:38px 20px 28px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1b1510 0%,#1a2855 50%,#2d1a55 100%);
  border-bottom:1px solid var(--line);
}
header.top::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(255,255,255,.02) 30px,rgba(255,255,255,.02) 31px)}
header.top::after{content:'🇮🇹';position:absolute;font-size:8rem;opacity:.04;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
header.top .flag{font-size:2.4rem;letter-spacing:.3em;opacity:.95;position:relative}
header.top h1{
  font-family:'Fraunces',serif;font-weight:700;
  font-size:clamp(1.8rem,5vw,3rem);margin:.18em 0 .14em;
  color:var(--gold2);letter-spacing:.5px;line-height:1.1;position:relative;
}
header.top p{margin:0;color:var(--muted);font-size:.9rem;position:relative;letter-spacing:.04em}
header.top .sub{font-style:italic;font-family:'Fraunces',serif;color:var(--muted)}

/* score bar */
.scorebar{
  position:sticky;top:0;z-index:30;margin:0 -18px 18px;padding:12px 18px;
  background:rgba(13,17,23,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.scorebar .label{font-weight:800;color:var(--gold);font-size:.85rem;letter-spacing:.04em;text-transform:uppercase}
.bar{flex:1;min-width:120px;height:9px;background:var(--card2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .5s ease}
.scorebar .nums{font-weight:800;font-variant-numeric:tabular-nums;font-size:.95rem;color:var(--txt)}
.scorebar .nums b{color:var(--green)}

/* nav chips */
.nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.chip{
  border:1px solid var(--line);background:var(--card);color:var(--muted);
  padding:7px 13px;border-radius:99px;font-family:'Inter';font-weight:700;
  font-size:.82rem;cursor:pointer;transition:.18s;white-space:nowrap;
}
.chip:hover{border-color:var(--gold);color:var(--txt)}
.chip.active{background:var(--gold);color:#1b1510;border-color:var(--gold)}

/* section */
section.lez{margin-bottom:30px;animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.lez > h2{
  font-family:'Fraunces',serif;font-weight:700;font-size:1.4rem;
  color:var(--gold2);margin:0 0 2px;display:flex;align-items:baseline;gap:10px;
}
.lez > h2 .date{
  font-family:'Inter';font-weight:800;font-size:.72rem;letter-spacing:.06em;
  background:var(--card2);border:1px solid var(--line);color:var(--gold);
  padding:3px 9px;border-radius:7px;
}
.lez > .instr{color:var(--muted);font-style:italic;font-family:'Fraunces',serif;margin:0 0 14px;font-size:.97rem}

/* question card */
.q{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow);
  transition:border-color .25s;
}
.q.ok{border-color:var(--green)}
.q.no{border-color:var(--red)}
.q .text{font-size:1.08rem;line-height:1.95}
.q .text .ru{display:block;color:var(--muted);font-size:.86rem;font-style:italic;margin-top:3px;line-height:1.4}

/* пропуск в тексте */
.gap{
  display:inline-block;min-width:54px;text-align:center;
  border-bottom:2px dashed var(--gold);color:var(--muted);
  padding:0 6px;margin:0 2px;font-weight:800;letter-spacing:2px;
}
.gap.filled{color:var(--green);border-bottom-style:solid;border-bottom-color:var(--green);letter-spacing:0}
.gap.wrong{color:var(--red);border-bottom-style:solid;border-bottom-color:var(--red);letter-spacing:0}

/* строка вариантов */
.mcrow{display:flex;align-items:center;gap:8px;margin-top:10px}
.blabel{
  flex:0 0 auto;width:22px;height:22px;border-radius:50%;
  background:var(--card2);border:1px solid var(--line);color:var(--gold);
  font-weight:800;font-size:.72rem;display:flex;align-items:center;justify-content:center;
}
.opts{display:flex;gap:7px;flex-wrap:wrap}
.opts.col{flex-direction:column;margin-top:10px}
.opt{
  position:relative;text-align:left;background:var(--card2);border:1px solid var(--line);
  color:var(--txt);padding:8px 14px;border-radius:10px;cursor:pointer;
  font-family:'Inter';font-weight:700;font-size:.96rem;transition:.15s;
}
.opt:hover{border-color:var(--gold);color:var(--gold2)}
.opt.ok{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.opt.no{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.opt.dim{opacity:.4}
.opt .say{margin-left:8px;opacity:.5;font-size:.85rem}
.opt .say:hover{opacity:1}

/* controls row */
.ctrl{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
button.act{
  border:1px solid var(--line);background:var(--card2);color:var(--txt);
  font-family:'Inter';font-weight:700;font-size:.83rem;padding:7px 14px;
  border-radius:9px;cursor:pointer;transition:.16s;
}
button.act:hover{border-color:var(--gold);color:var(--gold2)}
button.tts{padding:4px 9px;font-size:1rem;border:none;background:transparent}
button.tts.inline{margin-left:6px;vertical-align:middle;opacity:.6}
button.tts.inline:hover{opacity:1}
.fb{font-weight:700;font-size:.9rem;margin-left:2px;display:inline-block;margin-top:8px}
.fb.ok{color:var(--green)}
.fb.no{color:var(--red)}
.solution{
  margin-top:9px;font-size:.95rem;color:var(--green);
  background:var(--green-bg);border-left:3px solid var(--green);
  padding:7px 12px;border-radius:0 8px 8px 0;display:none;
}
.solution.show{display:block}
.solution b{color:var(--gold2)}

footer.btm{text-align:center;color:var(--muted);font-size:.82rem;margin-top:30px;padding-top:18px;border-top:1px solid var(--line)}
footer.btm a{color:var(--gold)}
.bigbtn{display:inline-block;margin:14px auto 0;}
.toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(60px);
  background:var(--gold);color:#1b1510;font-weight:800;padding:12px 22px;border-radius:99px;
  box-shadow:var(--shadow);opacity:0;transition:.35s;z-index:60;font-size:.95rem;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ============ НОРМАЛИЗАЦИЯ ОТВЕТА ============ */
function norm(s){
  return (s||"").toLowerCase().trim()
    .replace(/[''`’]/g,"'")
    .replace(/\s+/g," ")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[.?!,;]+$/,"");
}

/* ============ ОЗВУЧКА ============
   Встроенный синтез речи браузера (it-IT) с выбором самого «живого» голоса.
   Если захочешь подключить свой Google TTS (Neural2 / WaveNet) — он звучит
   ещё естественнее: замени тело speakNow() на свой вызов.               */
let _itVoice=null;
function pickItalianVoice(){
  const voices=window.speechSynthesis.getVoices().filter(v=>/^it(\b|[-_])/i.test(v.lang));
  if(!voices.length) return null;
  // приоритет: «живые» онлайн-голоса Google → премиум/enhanced → конкретные приятные имена → любой it
  const score=v=>{
    const n=(v.name||"").toLowerCase();
    let s=0;
    if(/google/.test(n))            s+=60;   // самые естественные в Chrome
    if(/natural|neural|premium|enhanced|wavenet/.test(n)) s+=50;
    if(/(alice|federica|luca|elsa|cosimo|chiara|isabella)/.test(n)) s+=20;
    if(v.localService===false)      s+=15;   // облачные обычно качественнее
    if(/it-it/i.test(v.lang))       s+=5;
    return s;
  };
  return voices.slice().sort((a,b)=>score(b)-score(a))[0];
}
function refreshVoice(){ _itVoice=pickItalianVoice()||_itVoice; }
if('speechSynthesis' in window){
  refreshVoice();
  window.speechSynthesis.onvoiceschanged=refreshVoice;
}
function speakNow(text){
  const synth=window.speechSynthesis;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="it-IT";
  u.rate=0.96;     // чуть медленнее обычного — речь спокойнее
  u.pitch=1.0;     // естественная высота
  u.volume=1.0;
  if(!_itVoice) refreshVoice();
  if(_itVoice) u.voice=_itVoice;
  synth.speak(u);
}
function speak(text){
  try{
    const synth=window.speechSynthesis;
    synth.cancel();                 // прерываем предыдущее
    // короткая пауза, чтобы движок «выдохнул» — убирает обрывистость в Chrome
    setTimeout(()=>speakNow(text), 60);
  }catch(e){}
}

/* ============ РЕНДЕР: тест с вариантами ============ */
let TOTAL=0;
const correctSet=new Set();      // ключи карточек, решённых полностью
const cardState={};              // ключ карточки -> массив bool по пропускам

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* пулы дистракторов: по каждой секции и по позиции пропуска */
function buildPools(sec){
  if(sec.type==="choice") return null;
  const byPos={}, all=[];
  sec.items.forEach(it=>{
    (it.b||[]).forEach((arr,pos)=>{
      const disp=arr[0];
      (byPos[pos]=byPos[pos]||[]).push(disp);
      all.push(disp);
    });
  });
  return {byPos,all};
}
function uniqByNorm(list){
  const seen=new Set(), out=[];
  list.forEach(x=>{const n=norm(x); if(!seen.has(n)){seen.add(n); out.push(x);}});
  return out;
}
/* 4 варианта для пропуска: верный + 3 правдоподобных */
function optionsFor(correctArr, pos, pools){
  const correctDisp=correctArr[0];
  const correctNorms=correctArr.map(norm);
  let pool=uniqByNorm((pools.byPos[pos]||[]).concat(pools.all))
            .filter(x=>!correctNorms.includes(norm(x)));
  shuffle(pool);
  const distract=pool.slice(0,3);
  const opts=shuffle([correctDisp,...distract]);
  return opts;
}

function buildMC(item, sec, sIdx, qIdx, pools){
  const key=sIdx+"_"+qIdx;
  const nBlanks=(item.b||[]).length;
  cardState[key]=new Array(nBlanks).fill(false);
  let bi=0;
  // текст с подсвеченными пропусками
  const text=esc(item.t).replace(/@/g,()=>{
    const g=`<span class="gap" id="gap_${key}_${bi}">·····</span>`;
    bi++; return g;
  });
  const ru=item.ru?`<span class="ru">${esc(item.ru)}</span>`:"";
  // полная фраза: каждый @ -> ответ СВОЕГО пропуска по порядку; убираем подсказки в скобках
  let fi=0;
  const full = item.full || (
    item.t.replace(/@/g, ()=> (item.b&&item.b[fi]?item.b[fi++][0]:""))
          .replace(/\s*\([^)]*\)/g,"")
          .replace(/\s+/g," ").trim()
  ) || item.ru || "";
  // группы вариантов по каждому пропуску
  let groups="";
  (item.b||[]).forEach((arr,pos)=>{
    const opts=optionsFor(arr,pos,pools);
    const label=nBlanks>1?`<span class="blabel">${pos+1}</span>`:"";
    const btns=opts.map(o=>
      `<button class="opt" data-k="${key}" data-pos="${pos}"
        onclick="pick(this,'${key}',${pos},${JSON.stringify(arr.map(norm)).replace(/"/g,'&quot;')})"
        data-w="${esc(o)}">${esc(o)}</button>`).join("");
    groups+=`<div class="mcrow">${label}<div class="opts">${btns}</div></div>`;
  });
  return `<div class="q" id="q_${key}">
    <div class="text">${text}${ru}
      <button class="act tts inline" title="Ascolta la frase" onclick="speak(this.dataset.s)" data-s="${esc(full)}">🔊</button>
    </div>
    ${groups}
    <div class="solution" id="sol_${key}"></div>
  </div>`;
}

function buildChoice(item, sec, sIdx, qIdx){
  const key=sIdx+"_"+qIdx;
  cardState[key]=[false];
  const opts=shuffle(item.opts.map((o,i)=>({o,i})));
  const btns=opts.map(({o,i})=>
    `<button class="opt" data-k="${key}"
       onclick="pickChoice(this,'${key}',${i},${item.correct})"
       data-w="${esc(o)}">${esc(o)}
       <span class="say" onclick="event.stopPropagation();speak(this.parentNode.dataset.w)">🔊</span></button>`).join("");
  return `<div class="q" id="q_${key}">
    <div class="text">${esc(item.t)}
      <button class="act tts inline" title="Ascolta" onclick="speak(this.dataset.s)" data-s="${esc(item.t)}">🔊</button>
    </div>
    <div class="opts col">${btns}</div>
    <span class="fb" id="fb_${key}"></span>
  </div>`;
}

let currentFilter=null;
function render(filter){
  currentFilter=filter;
  const nav=document.getElementById("nav");
  const content=document.getElementById("content");
  let chips=`<button class="chip ${!filter?'active':''}" onclick="render(null)">Все</button>`;
  DATA.forEach(s=>{chips+=`<button class="chip ${filter===s.id?'active':''}" onclick="render('${s.id}')">${s.date}</button>`;});
  nav.innerHTML=chips;
  const shown=filter?DATA.filter(s=>s.id===filter):DATA;
  let html="";
  shown.forEach(s=>{
    const sIdx=DATA.indexOf(s);
    const pools=buildPools(s);
    let qs="";
    s.items.forEach((it,qIdx)=>{
      qs += s.type==="choice" ? buildChoice(it,s,sIdx,qIdx) : buildMC(it,s,sIdx,qIdx,pools);
    });
    html+=`<section class="lez">
      <h2><span class="date">${s.date}</span>${esc(s.title)}</h2>
      <p class="instr">${esc(s.instr)}</p>
      ${qs}
    </section>`;
  });
  content.innerHTML=html;
  window.scrollTo({top:0,behavior:"smooth"});
}

/* подсчёт всех заданий один раз */
DATA.forEach(s=>s.items.forEach(()=>TOTAL++));
document.getElementById("scoreTot").textContent=TOTAL;

function updateScore(){
  const ok=correctSet.size;
  document.getElementById("scoreOk").textContent=ok;
  document.getElementById("barFill").style.width=(TOTAL?ok/TOTAL*100:0)+"%";
}

/* выбор варианта в обычном задании */
function pick(btn,key,pos,acceptedNorms){
  speak(btn.dataset.w);
  const good=acceptedNorms.includes(norm(btn.dataset.w));
  // подсветить кнопки этой группы
  const group=[...document.querySelectorAll(`.opt[data-k="${key}"][data-pos="${pos}"]`)];
  group.forEach(b=>b.classList.remove("ok","no","dim"));
  if(good){
    btn.classList.add("ok");
    group.forEach(b=>{if(b!==btn)b.classList.add("dim");});
  }else{
    btn.classList.add("no");
    group.forEach(b=>{if(acceptedNorms.includes(norm(b.dataset.w)))b.classList.add("ok");});
  }
  // заполнить пропуск в тексте
  const gap=document.getElementById(`gap_${key}_${pos}`);
  if(gap){gap.textContent=good?btn.dataset.w:btn.dataset.w; gap.className="gap "+(good?"filled":"wrong");}
  // состояние карточки
  cardState[key][pos]=good;
  const allOk=cardState[key].every(Boolean);
  const q=document.getElementById("q_"+key);
  q.classList.toggle("ok",allOk);
  if(allOk){
    correctSet.add(key);
    const sol=document.getElementById("sol_"+key);
    const tts=document.querySelector(`#q_${key} .tts`);
    if(sol&&tts){sol.innerHTML=`✓ <b>${esc(tts.dataset.s)}</b>`; sol.classList.add("show");}
  }else{
    correctSet.delete(key);
  }
  updateScore();
}

/* выбор варианта в задании "соедини" */
function pickChoice(btn,key,i,correct){
  const btns=[...document.querySelectorAll(`.opt[data-k="${key}"]`)];
  btns.forEach(b=>b.classList.remove("ok","no","dim"));
  const good=(i===correct);
  if(good){
    btn.classList.add("ok");
    btns.forEach(b=>{if(b!==btn)b.classList.add("dim");});
  }else{
    btn.classList.add("no");
  }
  speak(btn.dataset.w);
  const fb=document.getElementById("fb_"+key);
  fb.className="fb "+(good?"ok":"no");
  fb.textContent=good?"✓ Esatto!":"✗ Riprova";
  cardState[key][0]=good;
  if(good)correctSet.add(key); else correctSet.delete(key);
  updateScore();
}

function resetAll(){
  correctSet.clear();
  Object.keys(cardState).forEach(k=>delete cardState[k]);
  render(currentFilter);
  updateScore();
  toast("Ricominciamo! 💪");
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove("show"),2400);
}

render(null);
updateScore();
