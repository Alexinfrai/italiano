<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇮🇹 Attivo — русский → итальянский</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--card:#161b22;--card2:#1b2230;--line:#21262d;
  --txt:#f0ebe3;--muted:#7d8694;--gold:#c9a84c;--gold2:#e0c068;
  --green:#5ac4a0;--red:#e07070;--blu:#4a7fd0;
  --shadow:0 10px 32px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Nunito',sans-serif;min-height:100vh}
header{text-align:center;padding:30px 18px 20px;background:linear-gradient(135deg,#0d1117,#1a2855 55%,#2d1a55);border-bottom:1px solid var(--line);position:relative;overflow:hidden}
header::after{content:'🇮🇹';position:absolute;font-size:7rem;opacity:.04;top:50%;left:50%;transform:translate(-50%,-50%)}
header .flag{font-size:2rem;letter-spacing:.3em;position:relative}
header h1{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.8rem,6vw,2.8rem);color:var(--gold2);margin:.1em 0 .05em;position:relative}
header h1 em{font-style:italic;color:#b9a3ff}
header p{color:var(--muted);font-size:.88rem;font-family:'Playfair Display',serif;font-style:italic;position:relative}

/* API */
#api{background:#0e1422;border-bottom:1px solid var(--line);padding:9px 14px;font-size:.74rem}
#api.ok{background:#0f1410}
.api-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.api-in{flex:1;min-width:150px;background:#1b2230;border:1px solid var(--line);border-radius:7px;color:var(--txt);font-size:.76rem;padding:7px 10px;outline:none;font-family:'Nunito'}
.btn-c{background:var(--blu);border:none;border-radius:7px;color:#fff;font-weight:800;font-size:.74rem;padding:7px 13px;cursor:pointer}
.btn-x{background:#1b2230;border:1px solid var(--line);border-radius:7px;color:var(--muted);font-size:.74rem;padding:7px 10px;cursor:pointer}
#st{font-size:.68rem;margin-top:4px;min-height:13px;color:var(--muted)}
#st.ok{color:var(--green)}#st.err{color:var(--red)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#556;margin-right:6px}
.dot.on{background:var(--green)}
.hint{font-size:.66rem;color:#667;margin-top:5px}.hint a{color:var(--gold)}

.wrap{max-width:600px;margin:0 auto;padding:18px 16px 90px}

/* controls */
.row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;justify-content:center}
.chip{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:6px 12px;border-radius:99px;font-weight:700;font-size:.78rem;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--gold);color:var(--gold2)}
.chip.on{background:var(--gold);color:#0d1117;border-color:var(--gold)}

/* progress */
.prog{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.prog .bar{flex:1;min-width:120px;height:8px;background:var(--card2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.prog .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .4s}
.prog .n{font-weight:800;font-size:.8rem;color:var(--muted);white-space:nowrap}
.prog .n b{color:var(--green)}

/* card */
.q{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 20px;box-shadow:var(--shadow);text-align:center;min-height:230px;display:flex;flex-direction:column;justify-content:center;position:relative}
.q::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--blu))}
.q .tag{position:absolute;top:12px;right:14px;font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:2px 9px}
.q .ru{font-size:1.7rem;font-weight:800;color:var(--txt);line-height:1.3;margin-bottom:6px}
.q .hintttl{color:var(--muted);font-size:.82rem;font-style:italic;font-family:'Playfair Display',serif}
.q .it{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold2);margin-top:6px;display:none}
.q .it.show{display:block;animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.q .it .spk{font-size:1rem;margin-left:8px;cursor:pointer;opacity:.6;color:var(--blu)}
.q .it .spk:hover{opacity:1}

/* typing */
.typebox{margin-top:14px;display:none}
.typebox.show{display:block}
.typebox input{width:100%;background:var(--card2);border:1px solid var(--line);border-bottom:2px solid var(--gold);border-radius:8px;color:var(--gold2);font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;text-align:center;padding:10px;outline:none}
.typebox .fb{margin-top:8px;font-weight:700;font-size:.92rem;min-height:20px}
.typebox .fb.ok{color:var(--green)}.typebox .fb.no{color:var(--red)}

/* buttons */
.btns{display:flex;gap:10px;margin-top:16px}
.big{flex:1;border:none;border-radius:12px;font-family:'Nunito';font-weight:800;font-size:1rem;padding:15px;cursor:pointer;transition:.15s}
.big.reveal{background:var(--gold);color:#0d1117}
.big.reveal:hover{background:var(--gold2)}
.big.no{background:rgba(224,112,112,.16);color:var(--red);border:1px solid var(--red)}
.big.ok{background:rgba(90,196,160,.16);color:var(--green);border:1px solid var(--green)}
.big.no:hover{background:rgba(224,112,112,.26)}
.big.ok:hover{background:rgba(90,196,160,.26)}
.mode{display:flex;gap:7px;justify-content:center;margin-bottom:14px}
.mode .chip.on{background:var(--blu);border-color:var(--blu);color:#fff}
.subctrl{display:flex;justify-content:space-between;margin-top:14px;font-size:.78rem;color:var(--muted)}
.subctrl button{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Nunito';font-size:.78rem;text-decoration:underline}
.subctrl button:hover{color:var(--gold)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(60px);background:var(--gold);color:#0d1117;font-weight:800;padding:11px 20px;border-radius:99px;box-shadow:var(--shadow);opacity:0;transition:.35s;z-index:60;font-size:.9rem}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
footer{text-align:center;color:var(--muted);font-size:.78rem;margin-top:24px}
footer a{color:var(--gold)}
</style>
</head>
<body>
<header>
  <div class="flag">🇮🇹</div>
  <h1>Attivo <em>RU → IT</em></h1>
  <p>Вспомни итальянское слово по русскому</p>
</header>

<div id="api">
  <div class="api-row">
    <span><span class="dot" id="dot"></span><span id="api-t">🔊 Google TTS</span></span>
    <input class="api-in" id="key" type="password" placeholder="API ключ (необязательно)">
    <button class="btn-c" onclick="connectKey()">OK</button>
    <button class="btn-x" id="clr" style="display:none" onclick="clearKey()">✕</button>
  </div>
  <div id="st"></div>
  <div class="hint" id="hint">Тот же ключ, что в словаре. Без ключа — голос браузера.</div>
</div>

<div class="wrap">
  <div class="mode" id="mode">
    <button class="chip on" onclick="setMode('reveal')">🃏 Вспоминаю сам</button>
    <button class="chip" onclick="setMode('type')">⌨️ Печатаю</button>
  </div>

  <div class="row" id="cats"></div>

  <div class="prog">
    <span class="n">Выучено: <b id="learned">0</b> / <span id="total">0</span></span>
    <div class="bar"><i id="fill"></i></div>
    <span class="n" id="queue"></span>
  </div>

  <div class="q" id="card"></div>

  <div class="subctrl">
    <button onclick="skip()">→ Пропустить</button>
    <button onclick="resetProgress()">↺ Сбросить прогресс</button>
  </div>

  <footer>Прогресс сохраняется на этом устройстве · <a href="index.html">← Главная</a></footer>
</div>
<div class="toast" id="toast"></div>

":"sullo","ru":"на (м.р. Z/S+согл.)","t":"prep","tts":"sullo"},{"it":"sulla","ru":"на (ж.р. ед.ч.)","t":"prep","tts":"sulla"},{"it":"sull'","ru":"на (гласная)","t":"prep","tts":"sull'"},{"it":"sui","ru":"на (м.р. мн.ч.)","t":"prep","tts":"sui"},{"it":"sugli","ru":"на (м.р. мн.ч. гласн.)","t":"prep","tts":"sugli"},{"it":"sulle","ru":"на (ж.р. мн.ч.)","t":"prep","tts":"sulle"},{"it":"prima di","ru":"прежде чем, до","t":"prep","tts":"prima"},{"it":"anche se","ru":"даже если, хотя","t":"prep","tts":"anche"},{"it":"se","ru":"если","t":"prep","tts":"se"},{"it":"io","ru":"я","t":"pron","tts":"io"},{"it":"tu","ru":"ты","t":"pron","tts":"tu"},{"it":"lui","ru":"он","t":"pron","tts":"lui"},{"it":"lei","ru":"она / Вы (формально)","t":"pron","tts":"lei"},{"it":"noi","ru":"мы","t":"pron","tts":"noi"},{"it":"voi","ru":"вы (группа)","t":"pron","tts":"voi"},{"it":"loro","ru":"они","t":"pron","tts":"loro"},{"it":"Lei","ru":"Вы (формальное к 1 чел.)","t":"pron","tts":"Lei"},{"it":"mi","ru":"меня, мне (прямое)","t":"pron","tts":"mi"},{"it":"ti","ru":"тебя, тебе (прямое)","t":"pron","tts":"ti"},{"it":"lo","ru":"его, его (прямое м.р.)","t":"pron","tts":"lo"},{"it":"la","ru":"её, её (прямое ж.р.)","t":"pron","tts":"la"},{"it":"ci","ru":"нас, нам / здесь","t":"pron","tts":"ci"},{"it":"vi","ru":"вас, вам (прямое)","t":"pron","tts":"vi"},{"it":"li","ru":"их (м.р. прямое)","t":"pron","tts":"li"},{"it":"le","ru":"их (ж.р.) / ей (непрям.)","t":"pron","tts":"le"},{"it":"mio/mia","ru":"мой, моя, мои","t":"pron","tts":"mio"},{"it":"tuo/tua","ru":"твой, твоя, твои","t":"pron","tts":"tuo"},{"it":"suo/sua","ru":"его, её, его/её","t":"pron","tts":"suo"},{"it":"nostro/nostra","ru":"наш, наша, наши","t":"pron","tts":"nostro"},{"it":"vostro/vostra","ru":"ваш, ваша, ваши","t":"pron","tts":"vostro"},{"it":"loro","ru":"их (не изменяется)","t":"pron","tts":"loro"},{"it":"questo","ru":"этот, эта, эти","t":"pron","tts":"questo"},{"it":"quello","ru":"тот, та, те","t":"pron","tts":"quello"},{"it":"questi","ru":"эти (м.р.)","t":"pron","tts":"questi"},{"it":"stessa","ru":"тот же, та же","t":"pron","tts":"stessa"},{"it":"qualcuno","ru":"кто-то, кто-нибудь","t":"pron","tts":"qualcuno"},{"it":"qualcosa","ru":"что-то, что-нибудь","t":"pron","tts":"qualcosa"},{"it":"nessuno","ru":"никто, ни один","t":"pron","tts":"nessuno"},{"it":"niente","ru":"ничего","t":"pron","tts":"niente"},{"it":"tutto","ru":"всё, весь, все","t":"pron","tts":"tutto"},{"it":"tutti","ru":"все (люди)","t":"pron","tts":"tutti"},{"it":"ognuno","ru":"каждый (из них)","t":"pron","tts":"ognuno"},{"it":"alcuni","ru":"некоторые, несколько","t":"pron","tts":"alcuni"},{"it":"molto","ru":"много (как местоимение)","t":"pron","tts":"molto"},{"it":"poco","ru":"мало (как местоимение)","t":"pron","tts":"poco"},{"it":"troppo","ru":"слишком много","t":"pron","tts":"troppo"},{"it":"tanto","ru":"так много, столько","t":"pron","tts":"tanto"},{"it":"chi","ru":"кто? (вопр.)","t":"pron","tts":"chi"},{"it":"che cosa","ru":"что? (вопр.)","t":"pron","tts":"che"},{"it":"quale","ru":"какой? который?","t":"pron","tts":"quale"},{"it":"quanto","ru":"сколько?","t":"pron","tts":"quanto"},{"it":"che","ru":"который, что (относит.)","t":"pron","tts":"che"},{"it":"cui","ru":"которого/которому","t":"pron","tts":"cui"},{"it":"dove","ru":"где (относит.)","t":"pron","tts":"dove"},{"it":"si","ru":"себя, -ся (возвратное)","t":"pron","tts":"si"},{"it":"mi chiamo","ru":"меня зовут","t":"pron","tts":"mi"},{"it":"ne","ru":"из/о/него/ней (частица)","t":"pron","tts":"ne"},{"it":"ci","ru":"там, здесь / нас","t":"pron","tts":"ci"},{"it":"stesso","ru":"сам, сама, сами","t":"pron","tts":"stesso"},{"it":"questa","ru":"эта (ж.р.)","t":"pron","tts":"questa"},{"it":"queste","ru":"эти (ж.р.)","t":"pron","tts":"queste"},{"it":"quella","ru":"та (ж.р.)","t":"pron","tts":"quella"},{"it":"quelle","ru":"те (ж.р.)","t":"pron","tts":"quelle"}];
const T_LABELS={verb:'глагол',noun:'сущ.',adj:'прилаг.',adv:'наречие',prep:'предлог',pron:'местоим.'};

/* ===== TTS ===== */
let ttsKey=localStorage.getItem('it_tts_key')||'';
let ttsVoice=localStorage.getItem('it_tts_voice')||'it-IT-Wavenet-A';
const cache={};let curAudio=null;
async function gtts(text){
  if(cache[text])return cache[text];
  const body={input:{text},voice:{languageCode:'it-IT',name:ttsVoice},audioConfig:{audioEncoding:'MP3',speakingRate:0.86}};
  const r=await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${ttsKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'err');}
  const d=await r.json();cache[text]=d.audioContent;return d.audioContent;
}
function bSpeak(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='it-IT';u.rate=.9;const v=speechSynthesis.getVoices().find(x=>/^it/i.test(x.lang));if(v)u.voice=v;speechSynthesis.speak(u);}catch(e){}}
async function speak(t){
  if(curAudio){curAudio.pause();curAudio=null;}
  try{ if(ttsKey){const b=await gtts(t);const a=new Audio('data:audio/mp3;base64,'+b);curAudio=a;a.play();} else bSpeak(t); }
  catch(e){ setStatus('❌ '+e.message,'err'); bSpeak(t); }
}
function connectKey(){const k=document.getElementById('key').value.trim();if(!k){setStatus('Введи ключ','err');return;}setStatus('⏳...','');ttsKey=k;delete cache['ciao'];gtts('ciao').then(b=>{localStorage.setItem('it_tts_key',k);markConn();setStatus('✅ Подключено','ok');new Audio('data:audio/mp3;base64,'+b).play();}).catch(e=>{ttsKey='';setStatus('❌ '+e.message,'err');});}
function markConn(){document.getElementById('dot').classList.add('on');document.getElementById('api').classList.add('ok');document.getElementById('api-t').textContent='✅ Звук включён';document.getElementById('clr').style.display='block';document.getElementById('hint').style.display='none';document.getElementById('key').style.display='none';document.querySelector('.btn-c').style.display='none';}
function clearKey(){ttsKey='';localStorage.removeItem('it_tts_key');location.reload();}
function setStatus(m,t){const e=document.getElementById('st');e.textContent=m;e.className=t;}

/* ===== Прогресс (Leitner box) ===== */
// box: 0 = новое/провалено (часто), выше = реже; >=4 считаем выученным
let progress=JSON.parse(localStorage.getItem('attivo_progress')||'{}');
function saveProg(){localStorage.setItem('attivo_progress',JSON.stringify(progress));}
function box(w){return progress[w.it]?.b ?? 0;}
function setBox(w,b){progress[w.it]={b};saveProg();}

let mode='reveal';
let cat='all';
let pool=[], current=null, revealed=false;

function setMode(m){mode=m;[...document.querySelectorAll('#mode .chip')].forEach((c,i)=>c.classList.toggle('on',(m==='reveal')===(i===0)));next();}
function buildCats(){
  const cats=[['all','Все']].concat(Object.entries(T_LABELS));
  document.getElementById('cats').innerHTML=cats.map(([k,l])=>`<button class="chip ${k===cat?'on':''}" onclick="setCat('${k}')">${l}</button>`).join('');
}
function setCat(c){cat=c;buildCats();rebuild();next();}
function rebuild(){
  pool = WORDS.filter(w=>cat==='all'||w.t===cat);
  updateProg();
}
function updateProg(){
  const learned=pool.filter(w=>box(w)>=4).length;
  document.getElementById('learned').textContent=learned;
  document.getElementById('total').textContent=pool.length;
  document.getElementById('fill').style.width=(pool.length?learned/pool.length*100:0)+'%';
  const due=pool.filter(w=>box(w)<4).length;
  document.getElementById('queue').textContent=due+' на повтор';
}
/* выбор следующего: приоритет словам с низким box, элемент случайности */
function pickNext(){
  const due=pool.filter(w=>box(w)<4);
  const src=due.length?due:pool;
  // взвешиваем: чем ниже box, тем выше шанс
  const weighted=[];
  src.forEach(w=>{const reps=4-box(w);for(let i=0;i<Math.max(1,reps);i++)weighted.push(w);});
  let cand=weighted[Math.floor(Math.random()*weighted.length)];
  if(cand===current && src.length>1) return pickNext();
  return cand;
}
function next(){
  revealed=false;
  current=pickNext();
  render();
}
function render(){
  if(!current){document.getElementById('card').innerHTML='<div class="ru">Нет слов</div>';return;}
  const w=current;
  const typeMode = mode==='type';
  document.getElementById('card').innerHTML=`
    <span class="tag">${T_LABELS[w.t]} · ${box(w)>=4?'✓ выучено':'box '+box(w)}</span>
    <div class="ru">${w.ru}</div>
    <div class="hintttl">${typeMode?'напиши по-итальянски':'вспомни итальянское слово'}</div>
    <div class="it" id="ans">${w.it}<span class="spk" onclick="speak('${w.tts.replace(/'/g,"\\'")}')">🔊</span></div>
    <div class="typebox ${typeMode?'show':''}" id="tb">
      <input id="inp" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="...">
      <div class="fb" id="fb"></div>
    </div>
    <div class="btns" id="btns">
      ${typeMode
        ? `<button class="big reveal" onclick="checkType()">Проверить</button>`
        : `<button class="big reveal" onclick="reveal()">Показать ответ</button>`}
    </div>`;
  if(typeMode){const inp=document.getElementById('inp');inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkType();});}
  updateProg();
}
function reveal(){
  revealed=true;
  document.getElementById('ans').classList.add('show');
  speak(current.tts);
  document.getElementById('btns').innerHTML=`
    <button class="big no" onclick="grade(false)">✗ Не вспомнил</button>
    <button class="big ok" onclick="grade(true)">✓ Вспомнил</button>`;
}
function norm(s){return (s||'').toLowerCase().trim().replace(/[''`]/g,"'").replace(/\s+/g,' ').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[.?!,;]+$/,'');}
function checkType(){
  const val=document.getElementById('inp').value;
  // принимаем любую из вариантов через / и без артикля
  const variants=current.it.split('/').map(s=>s.trim());
  const extra=[];
  variants.forEach(v=>{const m=v.replace(/^(il|lo|la|l'|i|gli|le|un|uno|una|un')\s+/i,'');if(m!==v)extra.push(m);});
  const all=variants.concat(extra).map(norm);
  const good=all.includes(norm(val));
  document.getElementById('ans').classList.add('show');
  const fb=document.getElementById('fb');
  fb.className='fb '+(good?'ok':'no');
  fb.textContent=good?'✓ Верно!':'✗ Правильно: '+current.it;
  speak(current.tts);
  document.getElementById('btns').innerHTML = good
    ? `<button class="big ok" onclick="grade(true)">Дальше →</button>`
    : `<button class="big no" onclick="grade(false)">Дальше →</button>`;
}
function grade(ok){
  const b=box(current);
  setBox(current, ok ? Math.min(4,b+1) : 0);
  if(ok && Math.min(4,b+1)>=4) toast('🎉 Слово выучено!');
  next();
}
function skip(){next();}
function resetProgress(){
  if(!confirm('Сбросить весь прогресс тренажёра?'))return;
  progress={};saveProg();rebuild();next();toast('Прогресс сброшен');
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),1800);}

/* INIT */
if('speechSynthesis' in window)speechSynthesis.getVoices();
if(ttsKey)markConn();
buildCats();rebuild();next();
</script>
</body>
